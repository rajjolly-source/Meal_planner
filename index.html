<!DOCTYPE html>
<html>
<head>
    <title>Meal Planner App</title>
</head>
<body>
    <div id="meal-planner-output">Loading data...</div>

    <script>
        // Use your direct link here, ensure it ends in &output=csv
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg90dJccxkJ3BhMJU2TJexeRwlX8XL1Tq1rOWSX6-lCUDF3umkbMNKHuKPgjq1UFKl4eJjww3nC8vD/pub?gid=102504071&single=true&output=csv";

        async function fetchRecipesFromSheet() {
            try {
                // No proxy needed now!
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.text();
                document.getElementById('meal-planner-output').innerHTML = "Success! Data loaded. (Check console for raw data)";
                console.log("Raw CSV Data:", data);
            } catch (error) {
                document.getElementById('meal-planner-output').innerHTML = "Error: " + error.message;
            }
        }
        fetchRecipesFromSheet();
    </script>
</body>
</html>
