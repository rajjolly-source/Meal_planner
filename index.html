<!DOCTYPE html>
<html>
<head>
    <title>Family Meal Planner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .heart { font-size: 1.2em; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Family Meal Planner</h1>
    <button id="genBtn">Generate 14-Day Schedule</button>
    <div id="schedule-container" class="card-container"></div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg90dJccxkJ3BhMJU2TJexeRwlX8XL1Tq1rOWSX6-lCUDF3umkbMNKHuKPgjq1UFKl4eJjww3nC8vD/pub?gid=102504071&single=true&output=csv";

        async function fetchRecipesFromSheet() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                const lines = csvText.split('\n').filter(line => line.trim() !== "");
                const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
                
                window.recipePool = lines.slice(1).map(line => {
                    const values = line.split(',');
                    return {
                        name: values[headers.indexOf("dish name")],
                        cook: values[headers.indexOf("who's the cook?")],
                        rating: values[headers.indexOf("rating")] || ""
                    };
                });
                document.getElementById('genBtn').addEventListener('click', generateSchedule);
            } catch (error) { document.body.innerHTML = "Error loading: " + error.message; }
        }

        function generateSchedule() {
            const container = document.getElementById('schedule-container');
            container.innerHTML = "";
            
            for(let i = 1; i <= 14; i++) {
                const recipe = window.recipePool[Math.floor(Math.random() * window.recipePool.length)];
                
                // Convert R and K into pretty hearts
                let hearts = "";
                if (recipe.rating.includes("K")) hearts += "❤️K ";
                if (recipe.rating.includes("R")) hearts += "❤️R ";

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<strong>Day ${i}</strong><br>${recipe.name}<br><small>Cook: ${recipe.cook}</small><br><span class="heart">${hearts}</span>`;
                container.appendChild(card);
            }
        }

        fetchRecipesFromSheet();
    </script>
</body>
</html>
