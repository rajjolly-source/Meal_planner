<!DOCTYPE html>
<html>
<head>
    <title>Family Meal Planner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #ccc; transition: 0.3s; }
        .card.locked { border-left-color: #28a745; }
        .card.out { border-left-color: #dc3545; background: #fff5f5; }
        .actions { margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap; }
        button { font-size: 12px; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

    <h1>Family Meal Planner</h1>
    <button onclick="initializeSchedule()">Start Fresh Plan</button>
    <div id="schedule-container" class="card-container" style="margin-top: 20px;"></div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg90dJccxkJ3BhMJU2TJexeRwlX8XL1Tq1rOWSX6-lCUDF3umkbMNKHuKPgjq1UFKl4eJjww3nC8vD/pub?gid=102504071&single=true&output=csv";
        let schedule = [];

        async function fetchRecipes() {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const lines = data.split('\n').slice(1);
            window.recipePool = lines.map(line => {
                const v = line.split(',');
                return { name: v[1], cook: v[2], rating: v[3] || "" };
            });
            initializeSchedule();
        }

        function initializeSchedule() {
            schedule = Array(14).fill(null).map(() => ({ 
                ...window.recipePool[Math.floor(Math.random() * window.recipePool.length)], 
                locked: false, status: 'home' 
            }));
            render();
        }

        function render() {
            const container = document.getElementById('schedule-container');
            container.innerHTML = "";
            schedule.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = `card ${item.locked ? 'locked' : ''} ${item.status === 'out' ? 'out' : ''}`;
                let hearts = (item.rating.includes("K") ? "❤️K " : "") + (item.rating.includes("R") ? "❤️R " : "");
                
                card.innerHTML = `
                    <strong>Day ${i+1}</strong><br>
                    ${item.status === 'out' ? "Going out for dinner" : item.name}<br>
                    <small>${item.status === 'out' ? "" : 'Cook: ' + item.cook + ' ' + hearts}</small>
                    <div class="actions">
                        <button onclick="toggleLock(${i})">${item.locked ? 'Unlock' : 'Lock'}</button>
                        <button onclick="reroll(${i})" ${item.locked || item.status === 'out' ? 'disabled' : ''}>Reroll</button>
                        <button onclick="toggleOut(${i})">${item.status === 'out' ? 'Back Home' : 'Going Out'}</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleLock(i) { schedule[i].locked = !schedule[i].locked; render(); }
        function toggleOut(i) { schedule[i].status = (schedule[i].status === 'out' ? 'home' : 'out'); render(); }
        function reroll(i) { 
            schedule[i] = { ...window.recipePool[Math.floor(Math.random() * window.recipePool.length)], locked: false, status: 'home' }; 
            render(); 
        }

        fetchRecipes();
    </script>
</body>
</html>
