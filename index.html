<!DOCTYPE html>
<html>
<head>
    <title>Family Meal Planner</title>
    </head>
<body>
    <h1>Family Meal Planner</h1>
    <button onclick="initializeSchedule()">Start Fresh Plan</button>
    <div id="schedule-container" style="margin-top: 20px;"></div>
        
        <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg90dJccxkJ3BhMJU2TJexeRwlX8XL1Tq1rOWSX6-lCUDF3umkbMNKHuKPgjq1UFKl4eJjww3nC8vD/pub?gid=102504071&single=true&output=csv";
        
        // Ensure these are defined at the very top
        let recipePool = [];
        let schedule = []; 

        async function fetchRecipes() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const lines = data.split('\n');
                const headers = lines[0].toLowerCase().split(',');
                
                const idxName = headers.indexOf("dish name");
                const idxCook = headers.indexOf("who's the cook?");
                const idxRating = headers.indexOf("rating");

                recipePool = lines.slice(1).filter(l => l.trim()).map(line => {
                    const v = line.split(',');
                    return { 
                        name: v[idxName], 
                        cook: v[idxCook] || "Anyone", 
                        rating: v[idxRating] || "" 
                    };
                });
                
                // Only build the initial 14-day array if it doesn't exist
                if (schedule.length === 0) {
                    schedule = Array(14).fill(null).map(() => ({ 
                        ...recipePool[Math.floor(Math.random() * recipePool.length)], 
                        locked: false, 
                        status: 'home' 
                    }));
                }
                render();
            } catch (err) {
                document.getElementById('schedule-container').innerHTML = "Data Loading Error: " + err.message;
            }
        }

        function initializeSchedule() {
            // The "Start Fresh" button logic
            schedule = schedule.map((item) => {
                if (item.locked) {
                    return item; 
                } else {
                    return { 
                        ...recipePool[Math.floor(Math.random() * recipePool.length)], 
                        locked: false, 
                        status: 'home' 
                    };
                }
            });
            render();
        }

        // ... (Include your existing render/toggle functions here)
        fetchRecipes();
    </script>
</body>
</html>
