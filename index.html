<!DOCTYPE html>
<html>
<head>
    <title>Family Meal Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 15px; margin: 0; color: #333; }
        
        .card-container { display: grid; gap: 15px; grid-template-columns: 1fr; }
        @media (min-width: 900px) { .card-container { grid-template-columns: repeat(7, 1fr); } }
        
        .card { 
            padding: 15px; 
            border-radius: 16px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); 
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
        }
        
        .card.locked { box-shadow: 0 0 0 3px #28a745, 0 4px 8px rgba(0,0,0,0.1); }
        .card.out { background-color: #ffe8e8 !important; opacity: 0.8; }
        
        button, select { 
            cursor: pointer; 
            padding: 10px; 
            width: 100%; 
            margin-top: 8px; 
            font-size: 13px; 
            border-radius: 12px; 
            border: 1px solid #ddd; 
            background: white; 
            font-weight: 500;
        }
        button:hover, select:hover { background: #f0f0f0; }
        button:disabled, select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .shopping-box { 
            background: #fff; 
            padding: 20px; 
            border-radius: 16px; 
            margin-top: 20px; 
            margin-bottom: 30px; 
            border: 2px dashed #cbd5e1; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.03);
        }
        .shopping-box h3 { margin-top: 0; color: #475569; }
        
        .main-btn { background: #0ea5e9; color: white; padding: 12px; border: none; font-size: 15px; cursor: pointer; border-radius: 12px; font-weight: bold; width: auto; }
        .main-btn:hover { background: #0284c7; }

        .week-header { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 15px; }
        .week-header h2 { margin: 0; color: #334155; font-size: 1.5em; }
        .lock-week-btn { width: auto; background: #10b981; color: white; border: none; padding: 8px 16px; margin: 0; }
        
        .warning-flag {
            background-color: #fef3c7;
            color: #92400e;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.85em;
            margin-bottom: 10px;
            border: 1px solid #fcd34d;
            font-weight: 600;
        }
        
        .cook-select {
            margin-top: 4px;
            padding: 6px;
            font-size: 0.9em;
            border-radius: 6px;
            width: auto;
            display: inline-block;
            border-color: #cbd5e1;
            color: #475569;
        }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.2em; z-index: 1000; }
    </style>
</head>
<body>

    <div id="loading-overlay">Loading Shared Plan...</div>

    <h1>Family Meal Planner</h1>
    <div id="meta-info" style="margin-bottom: 15px; font-weight: bold; color: #64748b;"></div>
    <button class="main-btn" onclick="initializeSchedule()">Start Fresh Plan</button>
    
    <div class="week-header">
        <h2>Week 1</h2>
        <button class="lock-week-btn" onclick="lockWeek(1)">Lock Week 1</button>
    </div>
    <div id="week1-container" class="card-container"></div>
    <div id="shopping1-container"></div>

    <div class="week-header">
        <h2>Week 2</h2>
        <button class="lock-week-btn" onclick="lockWeek(2)">Lock Week 2</button>
    </div>
    <div id="week2-container" class="card-container"></div>
    <div id="shopping2-container"></div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg90dJccxkJ3BhMJU2TJexeRwlX8XL1Tq1rOWSX6-lCUDF3umkbMNKHuKPgjq1UFKl4eJjww3nC8vD/pub?gid=102504071&single=true&output=csv";
        
        // ⚠️ PASTE YOUR COPIED GOOGLE APPS SCRIPT WEB APP URL HERE:
        const scriptUrl = "https://script.google.com/macros/s/AKfycbw71WbBqS5_4C8f4BYA0tTerP7vCIBTi0AupK5Coz7OZ2bvsghgj4ek5LhuYc4oLLo4Aw/exec"; 
        
        let recipePool = [];
        let schedule = [];
        let globalGenDate = "Never";
        
        const dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const dayColors = ['#f8fafc', '#f1f5f9', '#fdf8f6', '#f0fdf4', '#f0f9ff', '#fdf4ff', '#fffbeb'];
        
        function getFormattedDate() {
            const d = new Date();
            return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear().toString().slice(-2)}`;
        }

        async function saveToCloud() {
            document.getElementById('loading-overlay').style.display = "flex";
            document.getElementById('loading-overlay').innerText = "Syncing changes...";
            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors', // Essential for Google Apps Script execution
                    body: JSON.stringify({ schedule: schedule, genDate: globalGenDate })
                });
                // Small buffer layout check before hiding overlay
                setTimeout(async () => { await syncFromCloud(); }, 800);
            } catch(e) {
                alert("Failed to sync changes to the cloud.");
                document.getElementById('loading-overlay').style.display = "none";
            }
        }

        async function syncFromCloud() {
            try {
                const res = await fetch(scriptUrl);
                const cloudData = await res.json();
                schedule = cloudData.schedule || [];
                globalGenDate = cloudData.genDate || "Never";
            } catch (e) {
                console.log("Cloud read error, system fallback initiated.");
            }
        }

        async function fetchRecipes() {
            try {
                const res = await fetch(csvUrl);
                const text = await res.text();
                const rows = text.split('\n');
                const headers = rows[0].toLowerCase().split(',').map(h => h.trim());
                
                recipePool = rows.slice(1).filter(l => l.trim()).map(line => {
                    const v = line.split(',');
                    return { 
                        name: v[headers.indexOf("dish name")] || "Unknown Dish", 
                        cook: v[headers.indexOf("who's the cook?")] || "Neha", 
                        rating: v[headers.indexOf("rating")] ? v[headers.indexOf("rating")].toUpperCase() : "", 
                        ingredients: v[headers.indexOf("ingredients")] || "" 
                    };
                });
                
                await syncFromCloud();
                
                if (schedule.length === 0) {
                    await initializeSchedule();
                } else {
                    render();
                }
            } catch(e) {
                document.getElementById('meta-info').innerText = "Error loading data.";
            } finally {
                document.getElementById('loading-overlay').style.display = "none";
            }
        }

        function render() {
            document.getElementById('meta-info').innerText = "Last generated: " + globalGenDate;
            
            const w1Cont = document.getElementById('week1-container');
            const w2Cont = document.getElementById('week2-container');
            w1Cont.innerHTML = "";
            w2Cont.innerHTML = "";
            
            let ingW1 = new Set();
            let ingW2 = new Set();

            schedule.forEach((item, i) => {
                const c = document.createElement('div');
                c.className = `card ${item.locked ? 'locked' : ''} ${item.status === 'out' ? 'out' : ''}`;
                
                if (item.status !== 'out') { c.style.backgroundColor = dayColors[i % 7]; }

                let h = "";
                if (item.rating) {
                    if (item.rating.includes("K")) h += "❤️K ";
                    if (item.rating.includes("R")) h += "❤️R ";
                }
                
                let dishOptionsHTML = `<option value="OUT" ${item.status === 'out' ? 'selected' : ''}>Going Out</option>`;
                recipePool.forEach(r => {
                    let safeName = r.name.replace(/"/g, '&quot;');
                    let isSelected = (item.status !== 'out' && item.name === r.name) ? 'selected' : '';
                    dishOptionsHTML += `<option value="${safeName}" ${isSelected}>${r.name}</option>`;
                });

                let currentCook = item.cook || 'Neha';
                let uniqueCooks = new Set([currentCook, 'Neha', 'Raj', 'Kayan', 'Vipin']);
                let cookOptionsHTML = '';
                uniqueCooks.forEach(cook => {
                    cookOptionsHTML += `<option value="${cook}" ${currentCook === cook ? 'selected' : ''}>Cook: ${cook}</option>`;
                });
                let cookSelect = `<select class="cook-select" onchange="changeCook(${i}, this.value)" ${item.locked || item.status === 'out' ? 'disabled' : ''}>${cookOptionsHTML}</select>`;

                let warningBanner = "";
                if (item.modified) {
                    warningBanner = `<div class="warning-flag">⚠️ ${item.modified.type} was changed on ${item.modified.date}</div>`;
                }

                c.innerHTML = `
                    ${warningBanner}
                    <div>
                        <strong style="font-size: 1.1em; color: #0f172a;">${dayNames[i % 7]}</strong><br>
                        <span style="font-size: 1.1em; font-weight: 500; display: inline-block; margin-top: 5px;">${item.status==='out' ? 'Out' : item.name}</span><br>
                        <div style="margin-top: 6px;">
                            ${item.status==='out' ? '' : cookSelect + '<br><span style="font-size: 1.2em; display: inline-block; margin-top: 3px;">' + h + '</span>'}
                        </div>
                    </div>
                    <div style="margin-top: 10px;">
                        <button onclick="toggleLock(${i})">${item.locked ? 'Unlock' : 'Lock'}</button>
                        <button onclick="reroll(${i})" ${item.locked || item.status === 'out' ? 'disabled' : ''}>Reroll</button>
                        <select onchange="manualOverride(${i}, this.value)" ${item.locked ? 'disabled' : ''}>
                            ${dishOptionsHTML}
                        </select>
                    </div>
                `;
                
                if (i < 7) {
                    w1Cont.appendChild(c);
                    if(item.ingredients && item.status !== 'out') {
                        let delim = item.ingredients.includes(';') ? ';' : ',';
                        item.ingredients.split(delim).forEach(ing => { if(ing.trim()) ingW1.add(ing.trim()); });
                    }
                } 
                else {
                    w2Cont.appendChild(c);
                    if(item.ingredients && item.status !== 'out') {
                        let delim = item.ingredients.includes(';') ? ';' : ',';
                        item.ingredients.split(delim).forEach(ing => { if(ing.trim()) ingW2.add(ing.trim()); });
                    }
                }
            });
            
            document.getElementById('shopping1-container').innerHTML = `<div class="shopping-box"><h3>Week 1 Shopping List</h3><ul style="margin-bottom: 0;">${Array.from(ingW1).map(i => `<li>${i}</li>`).join('')}</ul></div>`;
            document.getElementById('shopping2-container').innerHTML = `<div class="shopping-box"><h3>Week 2 Shopping List</h3><ul style="margin-bottom: 0;">${Array.from(ingW2).map(i => `<li>${i}</li>`).join('')}</ul></div>`;
        }

        async function toggleLock(i) { schedule[i].locked = !schedule[i].locked; await saveToCloud(); }
        
        async function lockWeek(weekNum) {
            let start = weekNum === 1 ? 0 : 7;
            let end = weekNum === 1 ? 7 : 14;
            for (let i = start; i < end; i++) { schedule[i].locked = true; }
            await saveToCloud();
        }

        async function manualOverride(i, val) {
            if (val === 'OUT') {
                schedule[i].status = 'out';
            } else {
                const selectedRecipe = recipePool.find(r => r.name === val);
                if (selectedRecipe) { schedule[i] = { ...selectedRecipe, cook: schedule[i].cook, locked: false, status: 'home' }; }
            }
            schedule[i].modified = { type: 'Dish', date: getFormattedDate() };
            await saveToCloud();
        }
        
        async function changeCook(i, newCook) {
            schedule[i].cook = newCook;
            schedule[i].modified = { type: 'Cook', date: getFormattedDate() };
            await saveToCloud();
        }

        async function reroll(i) { 
            let newRecipe = recipePool[Math.floor(Math.random()*recipePool.length)];
            schedule[i] = {...newRecipe, cook: schedule[i].cook, locked:false, status:'home'};
            schedule[i].modified = { type: 'Dish', date: getFormattedDate() };
            await saveToCloud(); 
        }
        
        async function initializeSchedule() {
            if (schedule.length === 0) {
                schedule = Array(14).fill(null).map(() => ({
                    ...recipePool[Math.floor(Math.random() * recipePool.length)],
                    locked: false, status: 'home'
                }));
            } else {
                schedule = schedule.map(it => {
                    if (it.locked) return it;
                    let freshDish = {...recipePool[Math.floor(Math.random()*recipePool.length)], locked:false, status:'home'};
                    delete freshDish.modified;
                    return freshDish;
                });
            }
            globalGenDate = new Date().toLocaleString();
            await saveToCloud();
        }

        fetchRecipes();
    </script>
</body>
</html>
